name: Server Stats CI

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x server-stats.sh

      - name: Run script
        run: ./server-stats.sh

      - name: Build Docker image
        run: docker build -t server-stats .
