name: Server Stats CI/CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x server-stats.sh

      - name: Run script
        run: ./server-stats.sh

      - name: Build Docker image
        run: docker build -t server-stats .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Set image tag
        run: |
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            echo "TAG=prod" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi

      - name: Tag Docker image
        run: docker tag server-stats ${{ secrets.DOCKER_USER }}/server-stats:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USER }}/server-stats:latest

      - name: Tag Docker image with version
        run: docker tag server-stats ${{ secrets.DOCKER_USER }}/server-stats:${{ env.TAG }}

      - name: Push version image
        run: docker push ${{ secrets.DOCKER_USER }}/server-stats:${{ env.TAG }}

      - name: Test script execution
        run: |
          chmod +x server-stats.sh
          ./server-stats.sh > output.txt
          ls -l
          cat output.txt

      - name: Validate output
        run: |
          grep -q "SERVER PERFORMANCE STATS REPORT" output.txt || exit 1

deploy-prod:
    runs-on: ubuntu-latest
    needs: run-script
    if: github.ref == 'refs/heads/main'

    environment:
      name: Production-practice

    steps:
      - name: Final deployment step
        run: echo "Deployment approved. Running production release."
