name: Server Stats CI/CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Test script
      - name: Run script and capture output
        run: |
          chmod +x server-stats.sh
          ./server-stats.sh > output.txt

      - name: Validate output
        run: |
          grep -q "SERVER PERFORMANCE STATS REPORT" output.txt || exit 1

      # 3. Build Docker image
      - name: Build Docker image
        run: docker build -t server-stats .

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # 5. Set environment-based tag
      - name: Set image tag
        run: |
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            echo "TAG=prod" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi

      # 6. Tag and push image
      - name: Tag Docker image
        run: docker tag server-stats ${{ secrets.DOCKER_USER }}/server-stats:${{ env.TAG }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USER }}/server-stats:${{ env.TAG }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    environment:
      name: Production-practice

    steps:
      - name: Deployment (approval required)
        run: echo "✅ Approved. Deploying to production..."